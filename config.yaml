# SFC Placement RL Environment Configuration

# Substrate Network Configuration
substrate:
  # Fixed size: 25 nodes (smaller network, difficulty preserved via scaled SFC/load)
  num_nodes:
    min: 25
    max: 25
  max_nodes: 25 # Fixed upper bound for obs/action space shapes
  mesh_connectivity: 1 # Slightly higher connectivity for small graph (paths exist)

  # Node resource ranges (scaled up for ~70% placement)
  resources:
    ram:
      min: 20
      max: 120
    cpu:
      min: 10
      max: 60
    storage:
      min: 250
      max: 1500
    # CIA triad security dimensions (independent per node)
    confidentiality:
      min: 1
      max: 5
    integrity:
      min: 1
      max: 5
    availability:
      min: 1
      max: 5
    # Trust zones: 0=public, 1=private, 2=dmz
    num_zones: 3

  # Link attribute ranges
  links:
    bandwidth:
      min: 100
      max: 500
    latency:
      min: 5
      max: 60
    security:
      min: 0.2
      max: 1.0

# SFC Request Configuration (scaled for 25-node substrate; difficulty preserved)
sfc:
  # Number of VNFs per chain
  vnf_count:
    min: 3
    max: 3

  # VNF resource demands
  vnf_resources:
    ram:
      min: 2
      max: 12
    cpu:
      min: 1
      max: 6
    storage:
      min: 20
      max: 120

  # SFC-level constraints
  constraints:
    # CIA security requirements (independent per dimension)
    confidentiality:
      min: 1
      max: 5
    integrity:
      min: 1
      max: 5
    availability:
      min: 1
      max: 5
    # Zone constraint: probability that SFC requires a specific trust zone
    required_zone_probability: 0.3
    num_zones: 3  # must match substrate.resources.num_zones
    # Minimum link security along each VNF-to-VNF path
    min_link_security:
      min: 0.0
      max: 0.6
    max_latency:
      min: 35
      max: 120
    min_bandwidth:
      min: 50
      max: 250

  # Time to live (truncated exponential on [min, max] via inverse CDF)
  ttl:
    distribution: exponential
    min: 1
    max: 25

  hard_isolation_probability: 0.1

# Training Configuration (PPO tuning for create_maskable_ppo)
training:
  total_timesteps: 200000
  # Learning rate: constant 1e-4, or linear decay from 3e-4
  learning_rate: 0.0001
  use_linear_lr_schedule: false
  lr_initial: 0.0003
  n_steps: 4096
  batch_size: 512
  n_epochs: 10
  gamma: 0.99
  ent_coef: 0.01
  gae_lambda: 0.97
  clip_range: 0.2
  max_requests_per_episode: 300
  randomize_topology: false
  randomize_request_generator: true

# Reward Configuration
rewards:
  acceptance: 1
  rejection: -1
  # Windowed acceptance ratio (AR) reward modifier
  acceptance_ratio_window: 10
  acceptance_ratio_reward_weight: 0.5
  acceptance_ratio_flip_rejection: true
  # CIA security margin rewards: incentivise choosing nodes with more security headroom.
  # cia_margin_weight: per-VNF step reward = weight * mean_normalized_cia_margin
  # cia_acceptance_weight: SFC-completion bonus added to acceptance reward before AR scale
  # link_security_weight: per-hop reward = weight * (path_link_sec - req_min_link_sec)
  cia_margin_weight: 0.10
  cia_acceptance_weight: 0.30
  link_security_weight: 0.05

# Evaluation Configuration
evaluation:
  num_requests: 1000
  num_episodes: 5
  use_training_substrate: true
  use_training_request_generator: false
