# SFC Placement RL Environment Configuration

# Substrate Network Configuration
substrate:
  # Fixed size: 25 nodes (smaller network, difficulty preserved via scaled SFC/load)
  num_nodes:
    min: 25
    max: 25
  max_nodes: 25 # Fixed upper bound for obs/action space shapes
  mesh_connectivity: 1 # Slightly higher connectivity for small graph (paths exist)

  # Node resource ranges (scaled up for ~70% placement)
  resources:
    ram:
      min: 20
      max: 120
    cpu:
      min: 10
      max: 60
    storage:
      min: 250
      max: 1500
    security_score:
      min: 1
      max: 5

  # Link attribute ranges (sufficient bandwidth)
  links:
    bandwidth:
      min: 100
      max: 500
    latency:
      min: 5
      max: 60

# SFC Request Configuration (scaled for 25-node substrate; difficulty preserved)
sfc:
  # Number of VNFs per chain (smaller chains so multiple fit in 25 nodes)
  vnf_count:
    min: 3
    max: 3

  # VNF resource demands (fits on nodes; similar relative load vs capacity)
  vnf_resources:
    ram:
      min: 2
      max: 12
    cpu:
      min: 1
      max: 6
    storage:
      min: 20
      max: 120

  # SFC-level constraints (achievable but require good placement)
  constraints:
    security_score:
      min: 1
      max: 5
    max_latency:
      min: 35
      max: 120
    min_bandwidth:
      min: 50
      max: 250

  # Time to live (truncated exponential on [min, max] via inverse CDF; optional mean, default = midpoint)
  ttl:
    distribution: exponential
    min: 1
    max: 25

  # Lower isolation probability to reduce pressure
  hard_isolation_probability: 0.1

# Training Configuration (PPO tuning for create_maskable_ppo)
training:
  total_timesteps: 100000
  # Learning rate: constant 1e-4, or linear decay from 3e-4 (set use_linear_lr_schedule: true)
  learning_rate: 0.0001 # 1e-4 (final value when using schedule)
  use_linear_lr_schedule: false
  lr_initial: 0.0003 # 3e-4 (start value when use_linear_lr_schedule is true)
  n_steps: 4096
  batch_size: 512
  n_epochs: 10
  gamma: 0.99
  ent_coef: 0.01 # entropy coefficient (decay later if desired)
  gae_lambda: 0.97
  clip_range: 0.2
  max_requests_per_episode: 300
  randomize_topology: false
  randomize_request_generator: true
# Reward Configuration
rewards:
  acceptance: 1
  rejection: -1
  # Windowed acceptance ratio (AR) reward modifier
  acceptance_ratio_window: 10            # number of recent requests to consider
  acceptance_ratio_reward_weight: 0.5    # scaling factor for the multiplicative modifier
  acceptance_ratio_flip_rejection: true  # use flipped multiplier (1-AR) on rejections

# Risk + Incident realism (full replacement model)
risk:
  enabled: true
  lambda: 4 # Reward penalty: reward -= lambda * risk_integral

  # Risk composition weights (normalized internally by sum of weights)
  w_vnf_tenancy: 0.22
  w_sfc_tenancy: 0.18
  w_inverse_security: 0.22
  w_incidents: 0.28
  w_exposure: 0.10

  # Robust normalization floors (scale-aware and topology-agnostic)
  tenancy_ref_floor: 1.0
  load_ref_floor: 1.0

  # Stochastic incident process
  incident_base_rate: 0.025 # Base per-node, per-exposure-step incident probability
  incident_alpha: 1.6 # Sensitivity to inverse effective security
  incident_beta: 0.7 # Amplification from node load
  incident_steps_cap: 12 # Max simulated exposure steps per request (min(TTL, cap))

  # Incident pressure state (temporary node degradation, decays each request tick)
  incident_pressure_gain: 0.20
  incident_pressure_decay: 0.92
  incident_block_threshold: 1.01 # Nodes above this pressure are temporarily unavailable
  incident_security_penalty: 0.00 # Effective security multiplier: (1 - penalty * pressure)

  # Incident consequence and reward coupling
  incident_cost_per_event: 0.20
  incident_cost_reward_scale: 0.05

# Evaluation Configuration
evaluation:
  num_requests: 1000
  num_episodes: 20
  use_training_substrate: true
  use_training_request_generator: false
